# Database Configuration - SQL Server localhost (real data)
spring.datasource.url=${SQLSERVER_URL:jdbc:sqlserver://D8FE05E79DEABBB\\SQLEXPRESS;databaseName=EyeCareHubDB;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${SQLSERVER_USER:sa}
spring.datasource.password=${SQLSERVER_PASSWORD:123456}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.h2.console.enabled=false

# ================= SERVER ==============
server.port=${PORT:8080}

spring.thymeleaf.cache=false 
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.check-template-location=false

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

