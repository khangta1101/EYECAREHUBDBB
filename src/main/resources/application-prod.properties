
spring.application.name=EyeCareHubDB

# Database Configuration - Uses MySQL if environment variables are set, otherwise uses H2
spring.datasource.url=jdbc:${DB_TYPE:h2}:${DB_URL:mem:eyecarehub}
spring.datasource.username=${MYSQLUSER:sa}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
